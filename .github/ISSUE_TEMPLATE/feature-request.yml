name: Feature request
description: Suggest an improvement to the patcher or its release workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the limitation or workflow gap.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior you want instead.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, examples, or constraints if they matter.
